# Tier 1 — fast, free, deterministic. Blocks every PR.
# Lint + typecheck + unit tests (recorded fixtures, mocked LLM) + build.
# No secrets required: AI/DB clients are lazy and never constructed here.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
